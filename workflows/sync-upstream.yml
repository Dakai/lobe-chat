name: Sync Fork with Upstream

on:
  schedule:
    # Runs everyday at midnight UTC
    # You can customize the cron schedule: https://crontab.guru/
    # For example, '0 0 * * 0' for every Sunday midnight
    - cron: '0 0 * * *'

  workflow_dispatch:
    # Allows you to trigger the workflow manually from the Actions tab

jobs:
  sync_to_upstream:
    runs-on: ubuntu-latest
    name: Sync upstream changes

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          # This token is automatically generated by GitHub and has permissions
          # to push to your repository.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Make sure to fetch all history for proper merging/rebasing
          fetch-depth: 0

      - name: Sync upstream
        uses: wei/git-sync@v1 # Use the git-sync action
        with:
          # The URL of the upstream repository (the original one)
          # e.g., https://github.com/original-org/original-repo.git
          source_repo: 'https://github.com/lobehub/lobe-chat.git' # <-- IMPORTANT: REPLACE THIS

          # The branch to sync from the upstream repository
          source_branch: 'main' # <-- Adjust if original repo uses 'master' or another branch

          # The branch in your fork to sync to
          destination_branch: 'main' # <-- Adjust if your fork uses 'master' or another branch

          # GitHub token for authentication (already provided by checkout)
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Optional: Choose merge or rebase.
          # 'rebase' keeps your history cleaner, effectively applying your commits atop upstream's.
          # 'merge' creates a merge commit.
          # If you have local commits on your 'main' that are not in upstream, 'rebase' is generally preferred.
          merge_conflict_method: 'rebase' # or 'merge'

          # Optional: Push options - useful for force push if you have to, but be careful!
          # push_options: 'force-with-lease'
